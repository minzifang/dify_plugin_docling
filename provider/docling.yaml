identity:
  author: "leeleo"
  name: "docling"
  label:
    en_US: "Docling"
    zh_Hans: "Docling 文档解析"
  description:
    en_US: "Parse documents through a standalone Docling Serve API."
    zh_Hans: "通过独立部署的 Docling Serve API 解析文档。"
  icon: icon.svg
  tags:
    - productivity
    - utilities
credentials_for_provider:
  docling_api_url:
    type: text-input
    required: true
    label:
      en_US: "Docling API URL"
      zh_Hans: "Docling API 地址"
    placeholder:
      en_US: "http://docling-serve:5001 or http://docling-serve:5001/v1/convert/file"
      zh_Hans: "http://docling-serve:5001 或 http://docling-serve:5001/v1/convert/file"
    help:
      en_US: "A Docling Serve URL reachable from Dify plugin-daemon. You can enter either the service base URL or the full conversion URL. If only the base URL is provided, /v1/convert/file is used automatically."
      zh_Hans: "填写 Dify plugin-daemon 能访问到的 Docling Serve 地址。可以填服务基础地址，也可以填完整解析地址。只填基础地址时，插件会自动使用 /v1/convert/file。"
  docling_api_key:
    type: secret-input
    required: false
    label:
      en_US: "API Key"
      zh_Hans: "API Key"
    placeholder:
      en_US: "Optional"
      zh_Hans: "可选"
    help:
      en_US: "Optional X-Api-Key token. Leave empty if your Docling Serve instance does not enforce an API key."
      zh_Hans: "可选的 X-Api-Key。若你的 Docling Serve 没有启用 API Key，可留空。"
  docling_convert_path:
    type: text-input
    required: false
    label:
      en_US: "Conversion Path"
      zh_Hans: "解析路径"
    placeholder:
      en_US: "Optional. Leave empty for official Docling Serve paths, or use / for a root-mounted gateway."
      zh_Hans: "可选。官方 Docling Serve 留空；如果网关把解析接口挂在根路径，可填 /。"
    help:
      en_US: "Advanced. Leave empty to use /v1/convert/file or /v1/convert/source automatically. Set this only when your gateway exposes conversion at a custom path such as /, /parse, or a full URL."
      zh_Hans: "高级选项。留空时插件会自动使用 /v1/convert/file 或 /v1/convert/source。仅当你的网关把解析接口暴露在 /、/parse 或其它完整 URL 时填写。"
tools:
  - tools/parse_file.yaml
extra:
  python:
    source: provider/docling.py
