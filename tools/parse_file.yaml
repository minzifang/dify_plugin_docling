identity:
  author: "leeleo"
  name: "parse_file"
  label:
    en_US: "Parse File"
    zh_Hans: "解析文件"
description:
  human:
    en_US: "Parse an uploaded file with a standalone Docling Serve API and return structured content."
    zh_Hans: "调用独立部署的 Docling Serve API 解析上传文件，并返回结构化内容。"
  llm: "Parse a file with Docling Serve. Use this for PDFs, Word, PowerPoint, Excel, HTML, Markdown, images, and similar document files. Advanced options are forwarded to Docling Serve and must be supported by the configured service."
parameters:
  - name: file
    type: file
    required: true
    label:
      en_US: "File"
      zh_Hans: "文件"
    human_description:
      en_US: "A Dify file variable from a start node, upload node, or upstream workflow step."
      zh_Hans: "来自开始节点、上传节点或上游节点的 Dify 文件变量。"
    llm_description: "The file object that should be parsed by Docling."
    form: llm
  - name: output_format
    type: select
    required: false
    default: markdown
    label:
      en_US: "Output Format"
      zh_Hans: "输出格式"
    human_description:
      en_US: "Choose the main format returned through the standard Dify `text` output. Markdown is usually best for LLM summarization and extraction."
      zh_Hans: "选择通过 Dify 标准 `text` 输出返回的正文格式。给大模型总结、抽取时通常建议使用 Markdown。"
    llm_description: "The output format for the returned content. Valid values are markdown, text, html, json, or doctags."
    form: form
    options:
      - value: markdown
        label:
          en_US: "Markdown"
          zh_Hans: "Markdown"
      - value: text
        label:
          en_US: "Plain Text"
          zh_Hans: "纯文本"
      - value: html
        label:
          en_US: "HTML"
          zh_Hans: "HTML"
      - value: json
        label:
          en_US: "JSON"
          zh_Hans: "JSON"
      - value: doctags
        label:
          en_US: "DocTags"
          zh_Hans: "DocTags"
  - name: execution_mode
    type: select
    required: false
    default: auto
    label:
      en_US: "Execution Mode"
      zh_Hans: "执行模式"
    human_description:
      en_US: "Auto uses sync for normal files and async for PDFs larger than 2 MB. Sync calls the conversion endpoint directly. Async submits a task and polls for the result."
      zh_Hans: "自动模式普通文件走同步，超过 2MB 的 PDF 走异步。同步模式直接调用转换接口；异步模式提交任务并轮询结果。"
    llm_description: "Use auto for most workflows. It switches larger PDFs to async."
    form: form
    options:
      - value: auto
        label:
          en_US: "Auto"
          zh_Hans: "自动"
      - value: async
        label:
          en_US: "Async"
          zh_Hans: "异步"
      - value: sync
        label:
          en_US: "Sync"
          zh_Hans: "同步"
  - name: max_file_size_mb
    type: number
    required: false
    default: 100
    label:
      en_US: "Max File Size (MB)"
      zh_Hans: "最大文件大小 (MB)"
    human_description:
      en_US: "Reject files larger than this limit before sending them to Docling Serve. This is a plugin-side safety limit."
      zh_Hans: "在发送到 Docling Serve 前拒绝超过该大小的文件。这是插件侧的安全限制。"
    llm_description: "Maximum allowed file size in megabytes."
    form: form
  - name: do_ocr
    type: boolean
    required: false
    default: false
    label:
      en_US: "OCR"
      zh_Hans: "启用 OCR"
    human_description:
      en_US: "Ask Docling Serve to run OCR for scanned PDFs and images. Enable only when needed because OCR can be slow on large files."
      zh_Hans: "请求 Docling Serve 对扫描 PDF 和图片执行 OCR。大文件中 OCR 可能很慢，建议只在需要时开启。"
    llm_description: "Whether Docling Serve should run OCR. This only works when the configured service supports OCR."
    form: form
  - name: send_advanced_options
    type: boolean
    required: false
    default: false
    label:
      en_US: "Send Advanced Options"
      zh_Hans: "发送高级参数"
    human_description:
      en_US: "Send OCR, table, image, PDF backend, and pipeline options to the API. Leave off to mimic Docling Serve UI/service defaults."
      zh_Hans: "向 API 发送 OCR、表格、图片、PDF backend、pipeline 等高级参数。关闭时更接近 Docling Serve UI 或服务端默认行为。"
    llm_description: "Whether to send advanced Docling conversion options. If false, only file, output format, target type, timeout, and page range are sent."
    form: form
  - name: request_transport
    type: select
    required: false
    default: auto
    label:
      en_US: "Request Transport"
      zh_Hans: "请求方式"
    human_description:
      en_US: "How the plugin sends the file to Docling. Auto uses Source JSON for PDFs up to 20 MB and multipart for larger PDFs to avoid base64 expansion. Most non-PDF files use multipart."
      zh_Hans: "插件把文件发送给 Docling 的方式。自动模式下 20MB 以内的 PDF 使用 Source JSON，更大的 PDF 使用 Multipart，避免 base64 膨胀；大多数非 PDF 使用 Multipart。"
    llm_description: "File transport to Docling Serve: auto, source_json, or multipart."
    form: form
    options:
      - value: auto
        label:
          en_US: "Auto"
          zh_Hans: "自动"
      - value: multipart
        label:
          en_US: "Multipart"
          zh_Hans: "Multipart"
      - value: source_json
        label:
          en_US: "Source JSON"
          zh_Hans: "Source JSON"
  - name: force_ocr
    type: boolean
    required: false
    default: false
    label:
      en_US: "Force OCR"
      zh_Hans: "强制 OCR"
    human_description:
      en_US: "Force OCR even when the document already contains selectable text. Useful for bad embedded text layers, but slower and may reduce accuracy on normal PDFs."
      zh_Hans: "即使文档已有可选中文本也强制 OCR。适合文本层质量很差的 PDF，但更慢，普通 PDF 上可能降低准确率。"
    llm_description: "Whether Docling Serve should force OCR over existing text. Use only when the existing text layer is poor."
    form: form
  - name: ocr_lang
    type: string
    required: false
    label:
      en_US: "OCR Languages"
      zh_Hans: "OCR 语言"
    human_description:
      en_US: "Comma-separated OCR language hints, for example en,zh. Supported values depend on the OCR backend installed in Docling Serve."
      zh_Hans: "OCR 语言提示，多个用英文逗号分隔，例如 en,zh。可用值取决于 Docling Serve 中安装的 OCR 后端。"
    llm_description: "Comma-separated OCR language hints. Supported values depend on the configured Docling service."
    form: form
  - name: do_table_structure
    type: boolean
    required: false
    default: true
    label:
      en_US: "Table Structure"
      zh_Hans: "表格结构"
    human_description:
      en_US: "Ask Docling to detect table cells, rows, and columns. Turn this off for faster parsing when table fidelity is not important."
      zh_Hans: "请求 Docling 识别表格单元格、行和列。如果不关心表格结构，可关闭以提升速度。"
    llm_description: "Whether Docling Serve should extract table structure."
    form: form
  - name: table_mode
    type: select
    required: false
    default: accurate
    label:
      en_US: "Table Mode"
      zh_Hans: "表格模式"
    human_description:
      en_US: "Choose table extraction quality. Accurate is slower but better for complex tables; Fast is quicker but may lose structure."
      zh_Hans: "选择表格识别质量。准确模式更慢但更适合复杂表格；快速模式速度更快但可能丢失结构。"
    llm_description: "Table mode. Valid values are accurate or fast."
    form: form
    options:
      - value: accurate
        label:
          en_US: "Accurate"
          zh_Hans: "准确"
      - value: fast
        label:
          en_US: "Fast"
          zh_Hans: "快速"
  - name: pdf_backend
    type: select
    required: false
    default: auto
    label:
      en_US: "PDF Backend"
      zh_Hans: "PDF 后端"
    human_description:
      en_US: "PDF parsing backend requested from Docling Serve. Auto means the plugin will not send this field and the service can choose its default."
      zh_Hans: "请求 Docling Serve 使用的 PDF 解析后端。自动表示插件不发送该字段，由服务端选择默认值。"
    llm_description: "PDF backend for Docling Serve. Use auto unless you know the configured service supports the selected backend."
    form: form
    options:
      - value: auto
        label:
          en_US: "Auto"
          zh_Hans: "自动"
      - value: pypdfium2
        label:
          en_US: "pypdfium2"
          zh_Hans: "pypdfium2"
      - value: dlparse_v1
        label:
          en_US: "dlparse_v1"
          zh_Hans: "dlparse_v1"
      - value: dlparse_v2
        label:
          en_US: "dlparse_v2"
          zh_Hans: "dlparse_v2"
      - value: dlparse_v4
        label:
          en_US: "dlparse_v4"
          zh_Hans: "dlparse_v4"
  - name: image_export_mode
    type: select
    required: false
    default: placeholder
    label:
      en_US: "Image Export"
      zh_Hans: "图片导出"
    human_description:
      en_US: "How extracted images are represented in Markdown, HTML, and JSON outputs. Embedded can produce very large results; placeholder is lighter."
      zh_Hans: "控制图片在 Markdown、HTML、JSON 输出中的表示方式。内嵌会让结果很大；占位符更轻量。"
    llm_description: "Image export mode. Valid values are embedded, placeholder, referenced."
    form: form
    options:
      - value: embedded
        label:
          en_US: "Embedded"
          zh_Hans: "内嵌"
      - value: placeholder
        label:
          en_US: "Placeholder"
          zh_Hans: "占位符"
      - value: referenced
        label:
          en_US: "Referenced"
          zh_Hans: "引用"
  - name: include_images
    type: boolean
    required: false
    default: false
    label:
      en_US: "Include Images"
      zh_Hans: "包含图片"
    human_description:
      en_US: "Ask Docling to include images in the converted document when the selected output format can carry them. Leave off for LLM workflows and large Word/PDF files."
      zh_Hans: "当所选输出格式支持图片时，请求 Docling 在转换结果中包含图片。给 LLM 使用或解析较大的 Word/PDF 时建议关闭。"
    llm_description: "Whether Docling Serve should include images."
    form: form
  - name: pipeline
    type: select
    required: false
    default: standard
    label:
      en_US: "Pipeline"
      zh_Hans: "处理管线"
    human_description:
      en_US: "Processing pipeline requested from Docling Serve. Use Standard for normal CPU deployments. VLM requires a Docling Serve setup with the required vision-language model support."
      zh_Hans: "请求 Docling Serve 使用的处理管线。普通 CPU 部署建议使用标准模式；VLM 需要服务端已配置视觉语言模型能力。"
    llm_description: "Processing pipeline. Use standard unless the configured Docling service supports VLM."
    form: form
    options:
      - value: standard
        label:
          en_US: "Standard"
          zh_Hans: "标准"
      - value: vlm
        label:
          en_US: "VLM"
          zh_Hans: "VLM"
  - name: page_range
    type: string
    required: false
    label:
      en_US: "Page Range"
      zh_Hans: "页码范围"
    human_description:
      en_US: "Optional inclusive page range, for example 1,3 or 1-3. Leave empty to parse the whole document."
      zh_Hans: "可选的闭区间页码范围，例如 1,3 或 1-3。留空表示解析整个文档。"
    llm_description: "Optional page range, for example 1,3 or 1-3."
    form: form
  - name: document_timeout
    type: number
    required: false
    label:
      en_US: "Document Timeout"
      zh_Hans: "单文档超时"
    human_description:
      en_US: "Optional Docling Serve per-document timeout in seconds. Leave empty to use the service default, which is closest to the official UI behavior."
      zh_Hans: "可选的 Docling Serve 单文档超时时间，单位秒。留空表示使用服务端默认值，更接近官方 UI 的行为。"
    llm_description: "Docling Serve timeout for each document in seconds."
    form: form
  - name: request_timeout
    type: number
    required: false
    default: 600
    label:
      en_US: "Request Timeout"
      zh_Hans: "请求超时"
    human_description:
      en_US: "HTTP timeout in seconds for synchronous file conversion requests. Large files may need several minutes; this setting should also be compatible with your Dify/plugin-daemon and Docling gateway timeouts."
      zh_Hans: "同步文件转换请求的 HTTP 超时秒数。大文件可能需要几分钟；该值也需要与 Dify/plugin-daemon 和 Docling 网关超时配置匹配。"
    llm_description: "HTTP timeout in seconds for sync conversion or async task submission."
    form: form
  - name: async_timeout
    type: number
    required: false
    default: 7200
    label:
      en_US: "Async Timeout"
      zh_Hans: "异步总超时"
    human_description:
      en_US: "Total wait budget in seconds for async polling. Complex PDFs can take many minutes. Only used when the actual execution mode is async."
      zh_Hans: "异步轮询的总等待时间，单位秒。复杂 PDF 可能需要很多分钟。仅在实际执行模式为 async 时使用。"
    llm_description: "Total async polling timeout in seconds."
    form: form
  - name: file_download_timeout
    type: number
    required: false
    default: 120
    label:
      en_US: "File Download Timeout"
      zh_Hans: "文件下载超时"
    human_description:
      en_US: "Timeout in seconds for downloading the Dify file into the plugin runtime before uploading it to Docling."
      zh_Hans: "插件把 Dify 文件下载到运行环境中的超时时间，下载完成后才会上传给 Docling。"
    llm_description: "Timeout in seconds for downloading the Dify file into the plugin runtime."
    form: form
  - name: poll_interval
    type: number
    required: false
    default: 5
    label:
      en_US: "Poll Interval"
      zh_Hans: "轮询间隔"
    human_description:
      en_US: "Seconds between async status checks. Keep 3-10 seconds for most deployments."
      zh_Hans: "异步模式下查询任务状态的间隔秒数。大多数部署建议保持在 3-10 秒。"
    llm_description: "Async status polling interval in seconds."
    form: form
  - name: max_output_chars
    type: number
    required: false
    default: 200000
    label:
      en_US: "Max Output Characters"
      zh_Hans: "最大输出字符数"
    human_description:
      en_US: "Maximum characters returned in the standard Dify `text` output. Use 0 for no truncation, but large outputs can slow down Dify workflows."
      zh_Hans: "Dify 标准 `text` 输出最多返回的字符数。填 0 表示不截断，但超大输出可能拖慢 Dify 工作流。"
    llm_description: "Maximum characters returned in the standard Dify text output. 0 means no truncation."
    form: form
  - name: include_raw_response
    type: boolean
    required: false
    default: false
    label:
      en_US: "Raw API Response"
      zh_Hans: "原始 API 响应"
    human_description:
      en_US: "Include the raw Docling API response in JSON for debugging. This can be very large and should stay off in production workflows."
      zh_Hans: "把 Docling API 原始响应放进 JSON，便于调试。该内容可能非常大，生产工作流建议关闭。"
    llm_description: "Whether to include raw Docling API response in JSON."
    form: form
output_schema:
  type: object
  properties:
    output_format:
      type: string
      description: "The selected output format."
    execution_mode:
      type: string
      description: "The actual execution mode used: async or sync."
    requested_execution_mode:
      type: string
      description: "The requested execution mode: auto, async, or sync."
    request_transport:
      type: string
      description: "The request transport used to send the file to Docling."
    requested_request_transport:
      type: string
      description: "The requested request transport: auto, source_json, or multipart."
    request_timeout:
      type: integer
      description: "HTTP request timeout used by the plugin."
    async_timeout:
      type: integer
      description: "Async polling timeout used by the plugin."
    filename:
      type: string
      description: "Original or inferred filename."
    mime_type:
      type: string
      description: "Original or inferred MIME type."
    size:
      type: integer
      description: "Input file size in bytes."
    status:
      type: string
      description: "Status returned by Docling Serve."
    processing_time:
      type: number
      description: "Processing time returned by Docling Serve."
    content_length:
      type: integer
      description: "Original converted content length before truncation."
    returned_content_length:
      type: integer
      description: "Returned content length after truncation."
    content_truncated:
      type: boolean
      description: "Whether content was truncated by the plugin."
    content:
      type: string
      description: "Converted document content in the selected output format. Use this field in downstream workflow nodes when selecting JSON output variables."
    content_preview:
      type: string
      description: "Short preview of the returned content."
extra:
  python:
    source: tools/parse_file.py
